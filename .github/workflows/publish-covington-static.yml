name: Publish Covington static candidate vision

on:
  push:
    branches: [main]
    paths:
      - '.covington-static-ready'

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pages repository
        uses: actions/checkout@v4

      - name: Download validated immutable campaign source
        shell: bash
        run: |
          set -euo pipefail
          BASE='https://raw.githubusercontent.com/russelldudek/AIAction/ad226138732728144e02eaa36d7e3e66a51c2db5'
          rm -rf covington-ai
          mkdir -p covington-ai/pdfs
          for file in index.html styles.css app.js resume.html cover-letter.html interview-brief.html 120-day-plan.html workflow-precedent-review.html source-notes.html; do
            curl -fsSL "$BASE/$file" -o "covington-ai/$file"
          done
          for file in Russell-Dudek-Covington-Resume.pdf Russell-Dudek-Covington-Cover-Letter.pdf Russell-Dudek-Covington-Interview-Brief.pdf Russell-Dudek-Covington-120-Day-Plan.pdf Russell-Dudek-Covington-Workflow-Precedent-Review.pdf; do
            curl -fsSL "$BASE/pdfs/$file" -o "covington-ai/pdfs/$file"
          done

      - name: Verify source and candidate-facing boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'Build the common law of AI-enabled work.' covington-ai/index.html >/dev/null
          grep -F 'Living precedent studio' covington-ai/index.html >/dev/null
          grep -F -- '--gold:#e8bd6b' covington-ai/styles.css >/dev/null
          grep -F 'Living precedent sphere' covington-ai/app.js >/dev/null
          test -s covington-ai/pdfs/Russell-Dudek-Covington-Resume.pdf
          test -s covington-ai/pdfs/Russell-Dudek-Covington-Cover-Letter.pdf
          if grep -RqiE 'roleforge|raw\.githack|github\.com/russelldudek/AIAction|source repository|public repository' covington-ai; then
            echo 'Candidate-facing confidentiality check failed.'
            exit 1
          fi

      - name: Commit complete static experience
        shell: bash
        run: |
          rm -f .github/workflows/publish-covington-static.yml .covington-static-ready
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete Covington candidate vision'
          git push
