name: Publish DeepHow candidate vision
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deephow-pages-${{ github.event_name }}
  cancel-in-progress: false
jobs:
  pages-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pages" > pages-state.json
          cat pages-state.json
      - name: Wait for marker-free release
        run: |
          base='https://russelldudek.github.io/DeepHow'
          for attempt in $(seq 1 12); do
            curl --fail --location --silent --show-error "$base/app.js?audit=$GITHUB_RUN_ID-$attempt" -o live-app.js
            if grep -q 'resolverRefinement' live-app.js && grep -q 'content:none!important;display:none!important' live-app.js; then
              exit 0
            fi
            sleep 10
          done
          echo 'Marker-removal release did not reach Pages in time.' >&2
          exit 1
      - name: Install browser audit dependency
        run: pip3 install --break-system-packages playwright
      - name: Verify live marker removal in Chrome
        run: |
          cat > live_marker_audit.py <<'PY'
          import asyncio, json, shutil
          from playwright.async_api import async_playwright

          BROWSER = next((shutil.which(x) for x in ['google-chrome-stable','google-chrome','chromium','chromium-browser'] if shutil.which(x)), None)
          if not BROWSER:
              raise SystemExit('No installed browser available')

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True, executable_path=BROWSER, args=['--no-sandbox','--disable-dev-shm-usage'])
                  page = await browser.new_page(viewport={'width':1280,'height':800})
                  errors=[]
                  page.on('pageerror', lambda error: errors.append(str(error)))
                  await page.goto('https://russelldudek.github.io/DeepHow/?marker-audit=1', wait_until='networkidle')
                  await page.wait_for_timeout(250)
                  async def state():
                      return await page.evaluate('''() => {
                        const active=document.querySelector('.work-source[aria-current="true"]');
                        const before=getComputedStyle(active,'::before');
                        const after=getComputedStyle(active,'::after');
                        return {
                          source:active?.dataset.source||'',
                          beforeDisplay:before.display,
                          afterDisplay:after.display,
                          beforeContent:before.content,
                          afterContent:after.content,
                          signal:document.querySelector('.signal-label')?.textContent.trim()||'',
                          learning:document.querySelector('.return-label')?.textContent.trim()||''
                        };
                      }''')
                  kct=await state()
                  await page.locator('button[data-scenario="output"]').click()
                  await page.wait_for_timeout(150)
                  oov=await state()
                  await page.screenshot(path='live-marker-free.png', full_page=False)
                  await browser.close()
                  checks={
                    'no_browser_errors':not errors,
                    'kct_markers_removed':kct['beforeDisplay']=='none' and kct['afterDisplay']=='none',
                    'oov_markers_removed':oov['beforeDisplay']=='none' and oov['afterDisplay']=='none',
                    'kct_arrows_retained':kct['signal']=='KCT to platform' and kct['learning']=='Learning back to KCT',
                    'oov_arrows_retained':oov['signal']=='OOV to platform' and oov['learning']=='Learning back to OOV'
                  }
                  record={'status':'passed' if all(checks.values()) else 'failed','checks':checks,'errors':errors,'kct':kct,'oov':oov}
                  open('live-marker-audit.json','w').write(json.dumps(record,indent=2))
                  print(json.dumps(record,indent=2))
                  if record['status']!='passed':
                      raise SystemExit(1)
          asyncio.run(main())
          PY
          python3 live_marker_audit.py
      - name: Upload live marker audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deephow-marker-removal-live-audit
          path: |
            pages-state.json
            live-app.js
            live-marker-audit.json
            live-marker-free.png
          if-no-files-found: warn
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
