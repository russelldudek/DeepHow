name: Publish verified DeepHow campaign
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: deephow-publication-${{ github.event_name }}
  cancel-in-progress: false
jobs:
  diagnostic:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify staged payload
        run: |
          ls -la campaign-payload.part-*
          cat campaign-payload.part-* > campaign-payload.b64
          base64 -d campaign-payload.b64 | tar -tz > /tmp/manifest.txt
          test -s /tmp/manifest.txt
          grep -q './index.html' /tmp/manifest.txt
          grep -q './scripts/qa.py' /tmp/manifest.txt
  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect staged campaign
        id: payload
        shell: bash
        run: |
          if compgen -G 'campaign-payload.part-*' > /dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Expand campaign source
        if: steps.payload.outputs.present == 'true'
        run: |
          cat campaign-payload.part-* > campaign-payload.b64
          base64 -d campaign-payload.b64 | tar -xz
          rm -f campaign-payload.b64 campaign-payload.part-*
          mkdir -p assets/brand docs qa
      - name: Retrieve official DeepHow identity
        if: steps.payload.outputs.present == 'true'
        run: |
          curl --fail --location --retry 3 'https://cdn.prod.website-files.com/68a896806364451d3e31efdb/68a8a17242ec643c737759bd_deephow-logo.svg' -o assets/brand/deephow-logo.svg
          test -s assets/brand/deephow-logo.svg
      - name: Install publication dependencies
        if: steps.payload.outputs.present == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0
          pip3 install --break-system-packages weasyprint pypdf pillow beautifulsoup4 playwright
      - name: Generate PDFs and run QA
        if: steps.payload.outputs.present == 'true'
        run: |
          python3 scripts/build_pdfs.py
          python3 scripts/qa.py
          python3 scripts/browser_qa.py
      - name: Commit complete campaign
        if: steps.payload.outputs.present == 'true'
        run: |
          git config user.name 'candidate-campaign-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m '[generated] Publish verified DeepHow candidate campaign'
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
