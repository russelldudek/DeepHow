name: Publish DeepHow candidate vision
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deephow-pages-${{ github.event_name }}
  cancel-in-progress: false
jobs:
  pages-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pages" > pages-state.json
          cat pages-state.json
      - name: Retrieve live application documents
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          base='https://russelldudek.github.io/DeepHow'
          for path in \
            resume.html \
            cover-letter.html \
            docs/Russell-Dudek-DeepHow-Resume.pdf \
            docs/Russell-Dudek-DeepHow-Cover-Letter.pdf
          do
            mkdir -p "live/$(dirname "$path")"
            curl --fail --location --silent --show-error --retry 8 --retry-delay 5 --max-time 60 \
              "$base/$path" -o "live/$path"
          done
      - name: Verify live document release
        run: |
          cmp resume.html live/resume.html
          cmp cover-letter.html live/cover-letter.html
          cmp docs/Russell-Dudek-DeepHow-Resume.pdf live/docs/Russell-Dudek-DeepHow-Resume.pdf
          cmp docs/Russell-Dudek-DeepHow-Cover-Letter.pdf live/docs/Russell-Dudek-DeepHow-Cover-Letter.pdf
          grep -q 'russelldudek.github.io/DeepHow/' live/cover-letter.html
          grep -q 'Work Address Resolver' live/cover-letter.html
          test "$(pdfinfo live/docs/Russell-Dudek-DeepHow-Resume.pdf | awk '/^Pages:/ {print $2}')" = '2'
          test "$(pdfinfo live/docs/Russell-Dudek-DeepHow-Cover-Letter.pdf | awk '/^Pages:/ {print $2}')" = '1'
          sha256sum resume.html live/resume.html cover-letter.html live/cover-letter.html \
            docs/Russell-Dudek-DeepHow-Resume.pdf live/docs/Russell-Dudek-DeepHow-Resume.pdf \
            docs/Russell-Dudek-DeepHow-Cover-Letter.pdf live/docs/Russell-Dudek-DeepHow-Cover-Letter.pdf \
            > live-document-sha256.txt
          cat live-document-sha256.txt
      - name: Upload Pages diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deephow-application-document-live-audit
          path: |
            pages-state.json
            live/
            live-document-sha256.txt
          if-no-files-found: warn
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
