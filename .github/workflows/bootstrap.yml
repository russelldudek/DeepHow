name: Publish verified DeepHow campaign
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: deephow-publication-${{ github.event_name }}
  cancel-in-progress: false
jobs:
  diagnostic:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify staged payload
        run: |
          ls -la campaign-payload.part-*
          cat campaign-payload.part-* > campaign-payload.b64
          base64 -d campaign-payload.b64 | tar -tz > /tmp/manifest.txt
          test -s /tmp/manifest.txt
          grep -q './index.html' /tmp/manifest.txt
          grep -q './scripts/qa.py' /tmp/manifest.txt
  build:
    if: github.event_name == 'pull_request' && github.head_ref == 'publication-diagnostic'
    needs: diagnostic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Expand campaign source
        run: |
          cat campaign-payload.part-* > campaign-payload.b64
          base64 -d campaign-payload.b64 | tar -xz
          rm -f campaign-payload.b64 campaign-payload.part-*
          mkdir -p assets/brand docs qa
      - name: Normalize final artifact manifest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest_path=Path('artifact-manifest.json')
          manifest=json.loads(manifest_path.read_text())
          manifest['assets']=[a for a in manifest.get('assets',[]) if a!='assets/deephow-product.jpg']
          manifest_path.write_text(json.dumps(manifest,indent=2)+'\n')
          qa=Path('scripts/qa.py')
          text=qa.read_text().replace(",\'assets/deephow-product.jpg\'","")
          qa.write_text(text)
          print([line for line in text.splitlines() if line.startswith('required=')][0])
          PY
      - name: Retrieve official DeepHow identity
        run: |
          curl --fail --location --retry 3 'https://cdn.prod.website-files.com/68a896806364451d3e31efdb/68a8a17242ec643c737759bd_deephow-logo.svg' -o assets/brand/deephow-logo.svg
          test -s assets/brand/deephow-logo.svg
      - name: Install publication dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0
          pip3 install --break-system-packages weasyprint pypdf pillow beautifulsoup4 playwright
      - name: Generate and validate PDFs
        run: python3 scripts/build_pdfs.py
      - name: Validate source and evidence integrity
        run: python3 scripts/qa.py
      - name: Validate responsive browser experience
        id: browser
        continue-on-error: true
        run: python3 scripts/browser_qa.py
      - name: Upload browser QA record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deephow-browser-qa
          path: qa/browser-qa.json
          if-no-files-found: warn
      - name: Enforce browser validation
        if: steps.browser.outcome != 'success'
        run: exit 1
      - name: Commit complete campaign to main
        run: |
          git config user.name 'candidate-campaign-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m '[generated] Publish verified DeepHow candidate campaign'
          git push origin main
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
