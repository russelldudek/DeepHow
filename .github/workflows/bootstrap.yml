name: Publish DeepHow candidate vision
on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deephow-pages-${{ github.event_name }}
  cancel-in-progress: false
jobs:
  pages-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect or enable GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/pages" > pages-before.json 2>pages-before.err
          before=$?
          set -e
          if [ "$before" -ne 0 ]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow > pages-create.json
          fi
          gh api "repos/${GITHUB_REPOSITORY}/pages" > pages-state.json
          cat pages-state.json
      - name: Probe candidate-vision URL
        run: |
          set +e
          curl --location --silent --show-error --max-time 30 \
            --dump-header live-headers.txt \
            --output live-index.html \
            "https://russelldudek.github.io/DeepHow/"
          echo "$?" > live-curl-status.txt
          set -e
          cat live-headers.txt || true
      - name: Upload Pages diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deephow-pages-diagnostic
          path: |
            pages-before.json
            pages-before.err
            pages-create.json
            pages-state.json
            live-headers.txt
            live-index.html
            live-curl-status.txt
          if-no-files-found: warn
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
